name: Vérification des alertes Nanobiotix

on:
  schedule:
    - cron: "*/15 7-18 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check-alerts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Vérifier les alertes et notifier Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/check_alerts.py

      - name: Sauvegarder l'état des alertes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add alerts_state.json
          git diff --staged --quiet || git commit -m "Update alerts state [skip ci]"
          git push
